<script>
document.addEventListener("DOMContentLoaded", () => {
  const lazyTarget = document.querySelector('#lazy-target');
  const template = document.querySelector('#lesson-body-template');

  if (!lazyTarget || !template) return; // Safety check

  const observer = new IntersectionObserver(entries => {
    entries.forEach(entry => {
      if (entry.isIntersecting) {
        lazyTarget.appendChild(template.content.cloneNode(true));
        observer.unobserve(lazyTarget);
      }
    });
  });

  observer.observe(lazyTarget);
});
</script>
